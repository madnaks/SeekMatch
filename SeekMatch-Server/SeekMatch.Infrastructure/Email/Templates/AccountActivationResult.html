<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{Title}}</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; background-color: #f9f9f9; padding: 20px; margin: 0;">
    <main style="max-width: 600px; margin: 40px auto; background: #003366; border-radius: 8px; padding: 28px 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); color: #F4F4F4;">
        <h1 style="color: #F4F4F4; font-size: 26px; line-height: 1.25; margin: 0 0 16px;">
            {{Title}}
        </h1>

        <p style="font-size: 16px; line-height: 1.6; margin: 0 0 22px;">
            {{Message}}
        </p>

        <hr style="border: none; border-top: 1px solid rgba(244,244,244,0.35); margin: 22px 0;" />

        <p style="font-size: 14px; line-height: 1.5; margin: 0; color: #F4F4F4;">
            The <strong style="color: #F4A460;">Bedaya</strong> team
        </p>
    </main>
</body>
</html>

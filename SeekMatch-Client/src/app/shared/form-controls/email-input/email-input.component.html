<div [formGroup]="form">
    <label for="inputEmail" class="form-label">
        <i class="fa-regular fa-envelope me-2"></i>
        {{ 'SHARED.FORM-CONTROLS.LABEL.EMAIL' | translate }}
        @if (isRequired()) {
        <span class="text-danger">*</span>
        }
    </label>
    <input type="email" class="form-control" id="inputEmail"
        [placeholder]="'SHARED.FORM-CONTROLS.PLACEHOLDER.EMAIL' | translate" formControlName="email" />
    @if (form.get('email')?.touched && form.get('email')?.errors?.['required']) {
    <app-error-message [message]="'SHARED.FORM-CONTROLS.VALIDATION.EMAIL-REQUIRED'" />
    }

    @if (form.get('email')?.touched && form.get('email')?.errors?.['email']) {
    <app-error-message [message]="'SHARED.FORM-CONTROLS.VALIDATION.EMAIL-INVALID'" />
    }
</div>
